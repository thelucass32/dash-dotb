// ═══ CSV ═══
function parseCSV(text){
  const rows=[]; let row=[],cur='',inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i],n=text[i+1];
    if(inQ){ if(c==='"'&&n==='"'){cur+='"';i++;} else if(c==='"'){inQ=false;} else cur+=c; }
    else { if(c==='"') inQ=true; else if(c===','){row.push(cur);cur='';} else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur='';} else if(c==='\r'){} else cur+=c; }
  }
  if(cur.length||row.length){row.push(cur);rows.push(row);}
  return rows.filter(r=>r.some(c=>c&&c.length));
}
function csvToObjects(text){
  const rows=parseCSV(text);
  if(!rows.length) return [];
  const headers=rows[0].map(h=>h.trim());
  return rows.slice(1).map(row=>{
    const o={}; headers.forEach((h,i)=>{ o[h]=row[i]?row[i].trim():''; }); return o;
  });
}
function isBlankRowObj(row){
  return !row || Object.values(row).every(v=>String(v||'').trim()==='');
}
function cleanRows(rows,label){
  const valid=(rows||[]).filter(r=>!isBlankRowObj(r));
  const removed=(rows||[]).length-valid.length;
  if(removed>0) console.log(`[dotb] ${label}: ${removed} linhas vazias removidas | ${valid.length} válidas`);
  else console.log(`[dotb] ${label}: ${valid.length} válidas`);
  return valid;
}

// ═══ CARREGAMENTO GOOGLE SHEETS ═══
// Estratégias, em ordem:
//   A. GViz CSV direto (se SHEET_ID preenchido) — sem proxy, mais confiável.
//   B. URL direto da publicação (funciona se a aba está publicada como CSV).
//   C. Cascata de proxies CORS (codetabs, allorigins, thingproxy).
//   D. GViz via <script> (último recurso, evita CORS por completo).
const PROXIES=[
  u=>u,                                                                          // direto
  u=>'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(u),           // codetabs (free, estável em 2026)
  u=>'https://api.allorigins.win/raw?url='+encodeURIComponent(u),                // allorigins (free, instável)
  u=>'https://thingproxy.freeboard.io/fetch/'+u                                  // thingproxy (limite ~100k/dia)
];

// Detecta se o que voltou é CSV de verdade, ou HTML de tela de login/erro.
function looksLikeCSV(text){
  if(!text || text.length < 5) return false;
  const lower = text.toLowerCase().slice(0, 2000);
  if(lower.includes('<!doctype html') || lower.includes('<html') || lower.includes('<head>')) return false;
  if(lower.includes('servicelogin') || lower.includes('accounts.google')) return false;
  return true;
}

async function fetchCSV(url){
  // ─── Estratégia A: GViz CSV direto via ID real (mais rápido, sem proxy) ───
  if(SHEET_ID){
    try{
      const gid = new URL(url).searchParams.get('gid') || '0';
      const gvizUrl = 'https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:csv&gid='+encodeURIComponent(gid);
      const r = await fetch(gvizUrl, {cache:'no-store'});
      if(r.ok){
        const txt = await r.text();
        if(looksLikeCSV(txt)){
          console.log('%c[dotb] ✓ GViz CSV direto (gid='+gid+')','color:#89cc72');
          return txt;
        }
      }
    }catch(e){ /* segue pra próxima estratégia */ }
  }

  // ─── Estratégia B+C: URL direto + cascata de proxies ───
  for(let i=0; i<PROXIES.length; i++){
    try{
      const r = await fetch(PROXIES[i](url), {cache:'no-store'});
      if(r.ok){
        const txt = await r.text();
        if(looksLikeCSV(txt)){
          if(i===0) console.log('%c[dotb] ✓ Fetch direto OK para gid='+(new URL(url).searchParams.get('gid')||'?'),'color:#89cc72');
          else console.log('%c[dotb] ✓ Proxy #'+i+' OK para gid='+(new URL(url).searchParams.get('gid')||'?'),'color:#89cc72');
          return txt;
        }
      }
    }catch(e){ /* tenta próximo */ }
  }

  // ─── Estratégia D: GViz via <script> (sem CORS) ───
  console.warn('[dotb] Direto + proxies falharam. Tentando GViz via <script> para:', url);
  return await fetchCSVViaGviz(url);
}
function gvizUrlFromPublishedCsv(url){
  const u = new URL(url);
  const gid = u.searchParams.get('gid') || '0';
  // Se SHEET_ID estiver preenchido, usa o endpoint oficial /d/<ID>/gviz (mais confiável)
  if(SHEET_ID){
    return 'https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:json&gid='+encodeURIComponent(gid)+'&_='+Date.now();
  }
  // Caso contrário, tenta gviz no endpoint publicado (funciona em algumas planilhas)
  const base = url.replace(/\/pub.*$/,'');
  return base + '/gviz/tq?tqx=out:json&gid=' + encodeURIComponent(gid) + '&_=' + Date.now();
}
function csvEscape(v){
  const s = String(v ?? '');
  return /[",\n\r]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
}
function gvizCellValue(cell){
  if(!cell) return '';
  if(cell.f !== undefined && cell.f !== null) return cell.f;
  const v = cell.v;
  if(v === undefined || v === null) return '';
  // Datas no GViz podem vir como Date(2026,5,29). Converte para dd/mm/aaaa.
  if(typeof v === 'string'){
    const m = v.match(/^Date\((\d+),(\d+),(\d+)/);
    if(m){
      const d = String(m[3]).padStart(2,'0');
      const mo = String(Number(m[2])+1).padStart(2,'0');
      return d + '/' + mo + '/' + m[1];
    }
  }
  return v;
}
function gvizResponseToCSV(resp){
  if(!resp || resp.status === 'error'){
    const msg = resp && resp.errors && resp.errors[0] ? resp.errors[0].detailed_message || resp.errors[0].message : 'GViz sem resposta';
    throw new Error(msg);
  }
  const table = resp.table || {};
  const headers = (table.cols || []).map((c,i)=>c.label || c.id || ('col_'+i));
  const lines = [headers.map(csvEscape).join(',')];
  (table.rows || []).forEach(row=>{
    const vals = headers.map((_,i)=>csvEscape(gvizCellValue(row.c ? row.c[i] : null)));
    lines.push(vals.join(','));
  });
  return lines.join('\n');
}
let GVIZ_CHAIN = Promise.resolve();
function fetchCSVViaGviz(url){
  // Serializa chamadas porque o Google retorna sempre google.visualization.Query.setResponse(...).
  GVIZ_CHAIN = GVIZ_CHAIN.then(()=>new Promise((resolve,reject)=>{
    const gvizUrl = gvizUrlFromPublishedCsv(url);
    window.google = window.google || {};
    window.google.visualization = window.google.visualization || {};
    window.google.visualization.Query = window.google.visualization.Query || {};
    const oldHandler = window.google.visualization.Query.setResponse;
    const script = document.createElement('script');
    let done = false;
    const cleanup = () => {
      done = true;
      script.remove();
      window.google.visualization.Query.setResponse = oldHandler || function(){};
    };
    const timer = setTimeout(()=>{
      if(done) return;
      cleanup();
      reject(new Error('Timeout ao carregar Google Sheets via GViz'));
    }, 25000);
    window.google.visualization.Query.setResponse = function(resp){
      if(done) return;
      clearTimeout(timer);
      try{
        const csv = gvizResponseToCSV(resp);
        cleanup();
        resolve(csv);
      }catch(err){
        cleanup();
        reject(err);
      }
    };
    script.onerror = () => {
      if(done) return;
      clearTimeout(timer);
      cleanup();
      reject(new Error('Falha ao carregar Google Sheets via GViz'));
    };
    script.src = gvizUrl;
    document.head.appendChild(script);
  }));
  return GVIZ_CHAIN;
}

// ═══ HELPERS ═══
const fmtN = n => new Intl.NumberFormat('pt-BR').format(Math.round(n||0));
const fmtM = n => new Intl.NumberFormat('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n||0);
const fmtP = n => ((n||0)*100).toFixed(2).replace('.',',')+' %';
const fmtR = n => (n||0).toFixed(2).replace('.',',')+'x';
const money0 = n => 'R$ '+fmtN(n);   // arredondado, sem casas decimais
const money2 = n => 'R$ '+fmtM(n);   // duas casas decimais
// Fallback p/ thumbnail quebrada (Meta às vezes expira a URL)
window.dotbImgFail = function(el){ const s=document.createElement('span'); s.className='cr-noimg'; s.textContent='—'; el.replaceWith(s); };

function parseDate(s){
  if(!s) return null; s=String(s).trim();
  let m=s.match(/^(\d{4})-(\d{2})-(\d{2})/); if(m) return m[1]+'-'+m[2]+'-'+m[3];
  m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/); if(m) return m[3]+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');
  m=s.match(/^(\d{4})\/(\d{2})\/(\d{2})/); if(m) return m[1]+'-'+m[2]+'-'+m[3];
  return null;
}
function parseMoney(s){
  if(s===null||s===undefined||s==='') return 0;
  if(typeof s==='number') return s;
  // Remove aspas, R$, espaços e outros caracteres não numéricos exceto vírgula e ponto
  let str=String(s).replace(/["R$\s]/gi,'');
  // pt-BR: 1.234,56  → remove thousand dots, comma→dot
  if(/,\d{1,2}$/.test(str)) str=str.replace(/\./g,'').replace(',','.');
  else str=str.replace(/,/g,'');
  const n=parseFloat(str); return isNaN(n)?0:n;
}
function num(s){ const n=parseFloat(String(s).replace(/[^\d.-]/g,'')); return isNaN(n)?0:n; }
function normText(s){
  const str = String(s||'').toLowerCase();
  return str.normalize ? str.normalize('NFD').replace(/[\u0300-\u036f]/g,'') : str;
}
function normCompact(s){ return normText(s).replace(/[^a-z0-9]/g,''); }
function normSpaced(s){ return normText(s).replace(/[^a-z0-9]+/g,' ').trim().replace(/\s+/g,' '); }
function headerForms(h){ return [String(h||'').toLowerCase(), normText(h), normSpaced(h), normCompact(h)]; }
function isRecurrencyHeader(h){
  const n = normCompact(h);
  if(!n) return false;
  const positive = n.includes('recurrency') || n.includes('recurrence') || n.includes('recurring') ||
    n.includes('recorrencia') || n.includes('recorr') || n.includes('installment') ||
    n.includes('parcela') || n.includes('parcelas') || n.includes('parcel') ||
    n.includes('paymentnumber') || n.includes('chargenumber') || n.includes('cobrancanumber') ||
    (n.includes('cycle') && n.includes('number')) || (n.includes('ciclo') && n.includes('numero'));
  const negative = n.includes('price') || n.includes('preco') || n.includes('valor') || n.includes('value') ||
    n.includes('amount') || n.includes('status') || n.includes('date') || n.includes('data') ||
    n.includes('email') || n.includes('mail') || n.includes('product') || n.includes('produto') ||
    n.includes('buyer') || n.includes('comprador') || n.includes('phone') || n.includes('telefone');
  return positive && !negative;
}
function productNormKey(r){
  return COLS.hotProd ? (normSpaced(r[COLS.hotProd]) || '__sem_produto__') : '__sem_produto__';
}
function buildHotProductValueStats(){
  const buckets = {};
  (RAW.hotmart||[]).forEach(r=>{
    if(COLS.hotStatus && !['approved','completed'].includes(hotStatusGroup(r[COLS.hotStatus]))) return;
    const key = productNormKey(r);
    const v = COLS.hotValue ? parseMoney(r[COLS.hotValue]) : 0;
    if(v>0){ (buckets[key]=buckets[key]||[]).push(v); }
  });
  HOT_PRODUCT_VALUE_STATS = {};
  Object.keys(buckets).forEach(k=>{
    const arr = buckets[k].sort((a,b)=>a-b);
    const max = arr[arr.length-1] || 0;
    const p75 = arr[Math.floor((arr.length-1)*0.75)] || max;
    const top = arr.slice(Math.max(0, Math.floor(arr.length*0.8)));
    const topAvg = top.length ? top.reduce((s,n)=>s+n,0)/top.length : max;
    HOT_PRODUCT_VALUE_STATS[k] = {count:arr.length, max, p75, topAvg};
  });
}
function rowInstallmentClue(r){
  // Procura pista de parcela em qualquer coluna, mesmo que o cabeçalho exato não tenha sido detectado.
  // Retorna: 'first' | 'later' | null
  if(!r) return null;
  for(const [k,v] of Object.entries(r)){
    const h = normSpaced(k);
    const raw = String(v ?? '').trim();
    const t = normSpaced(raw);
    if(!t) continue;
    const context = h + ' ' + t;
    const mentionsInstallment = /(recurrency|recurrence|recurring|recorrencia|recorr|installment|parcela|parcelas|parcel|payment number|charge number|cobranca|cobrança|cycle|ciclo|assinatura|subscription)/.test(context);
    if(!mentionsInstallment) continue;
    if(/\b(first|primeira|primeiro|one|unica|unico)\b/.test(t)) return 'first';
    if(/\b(second|segunda|segundo|third|terceira|terceiro|quarta|quarto|quinta|quinto|sexta|sexto|sixth)\b/.test(t)) return 'later';
    const m = t.match(/\d+/);
    if(m){
      const n = parseInt(m[0],10);
      if(n>1) return 'later';
      if(n<=1) return 'first';
    }
  }
  return null;
}
function isLikelyInstallmentAmountWithoutRecurrency(r){
  // Fallback conservador quando a aba não traz recurrency/parcela.
  // Ex.: Full Stack tem venda cheia ~R$ 1.395,36 e parcelas ~R$ 239,34.
  // Sem a coluna de recorrência, valores muito menores que o ticket típico do produto
  // são tratados como parcela/recorrência para NÃO inflar quantidade de vendas e CAC.
  if(COLS.hotRecurrency) return false;
  const v = COLS.hotValue ? parseMoney(r[COLS.hotValue]) : 0;
  if(v<=0) return false;
  const st = HOT_PRODUCT_VALUE_STATS[productNormKey(r)];
  if(!st || st.count < 2 || st.max <= 0) return false;
  const ref = Math.max(st.p75 || 0, st.topAvg || 0, st.max || 0);
  if(ref <= 0) return false;
  // Parcela provável: valor até 45% do ticket alto do mesmo produto, com diferença bem clara.
  return (v <= ref * 0.45) && (ref >= v * 1.8);
}
// Datas da Hotmart usadas com objetivos diferentes:
// - Receita/faturamento: data de recebimento/transação (Data BR), com fallback para Purchase Order Date.
// - Quantidade de vendas: data da compra original (Purchase Order Date), com fallback para Data BR.
// Assim uma parcela recebida em 26/06 entra no faturamento de 26/06, mas NÃO vira venda do dia 26/06.
function hotRevenueDate(r){
  const cashDate = COLS.hotDateBR ? parseDate(r[COLS.hotDateBR]) : null;
  return cashDate || parseDate(r[COLS.hotDate]);
}
function hotSaleDate(r){
  const orderDate = parseDate(r[COLS.hotDate]);
  const cashDate = COLS.hotDateBR ? parseDate(r[COLS.hotDateBR]) : null;
  return orderDate || cashDate;
}
// Mantido como alias para compatibilidade: quando alguém chama hotRowDate, entende-se data de receita.
function hotRowDate(r){ return hotRevenueDate(r); }

// ─────────────────────────────────────────────────────────────────────────────
// EIXO DE DATA ÚNICO (corrige o problema "1 venda mas R$ 0,00 de faturamento")
// Antes: a VENDA era contada pela data da compra e o FATURAMENTO pela data de
// recebimento. Quando elas caíam em dias diferentes, ao filtrar 1 dia aparecia
// venda sem faturamento (ou vice-versa). Agora venda e faturamento usam a MESMA
// data, então sempre batem no dia que você filtra.
//   'order' (padrão): data da compra (Purchase Order Date) + fallback recebimento.
//   'cash'          : data de recebimento (Data BR) + fallback compra (regime de caixa).
const DATE_BASIS = 'order';
function hotKpiDate(r){
  if(DATE_BASIS==='cash'){
    return (COLS.hotDateBR ? parseDate(r[COLS.hotDateBR]) : null) || parseDate(r[COLS.hotDate]);
  }
  return parseDate(r[COLS.hotDate]) || (COLS.hotDateBR ? parseDate(r[COLS.hotDateBR]) : null);
}

// ─────────────────────────────────────────────────────────────────────────────
// TRAVA POR E-MAIL — chave única do comprador.
// Usada para contar VENDAS ÚNICAS (mesmo comprador = 1 venda) e gerar o CAC certo.
// Fallback: telefone. Linha sem e-mail nem telefone conta como 1 (não some).
// Identidade do comprador para dedupe. Prioridade:
//   1. Transaction ID (mais robusto — é único por compra; parcelas compartilham)
//   2. Email
//   3. Telefone
//   4. Buyer Name (último recurso, propenso a falsos positivos com nomes comuns)
function emailKey(r){
  const txn = COLS.hotTxnId ? String(r[COLS.hotTxnId]||'').trim() : '';
  if(txn) return 'txn:'+txn;
  const e = COLS.hotEmail ? String(r[COLS.hotEmail]||'').trim().toLowerCase() : '';
  if(e) return 'mail:'+e;
  const p = normPhone(r[COLS.hotPhone]);
  if(p) return 'tel:'+p;
  const buyer = COLS.hotBuyer ? String(r[COLS.hotBuyer]||'').trim().toLowerCase() : '';
  if(buyer) return 'name:'+buyer;
  return '';
}
// Conta vendas únicas. A chave depende do TIPO de identidade encontrado:
//   - Transaction ID → ÚNICO POR COMPRA na Hotmart. Usa direto, sem combinar com nada.
//     Duas linhas com mesmo Transaction = mesma compra (parcelas) → 1 venda.
//   - Email/Telefone/Buyer Name → combina com data da compra (truncada YYYY-MM-DD) + produto,
//     pra colapsar parcelas da mesma compra que apareçam com timestamps ligeiramente diferentes.
function saleDedupeKey(r){
  const identity = emailKey(r);
  if(identity && identity.startsWith('txn:')) return identity;
  const orderDateRaw = COLS.hotDate ? String(r[COLS.hotDate]||'').trim() : '';
  const orderDate = (hotSaleDate(r) || parseDate(orderDateRaw) || orderDateRaw.slice(0,10) || '').slice(0,10);
  const product = COLS.hotProd ? String(r[COLS.hotProd]||'').trim().toLowerCase() : '';
  if(identity) return identity + '|' + orderDate + '|' + product;
  // Fallback seguro para linhas sem e-mail/telefone/transaction/buyer:
  // parcela da mesma compra costuma repetir produto + data da compra. Sem identidade,
  // melhor colapsar isso para não inflar CAC do que contar cada parcela como venda nova.
  return 'anon|' + orderDate + '|' + product;
}
function countUniqueSales(rows){
  const seen = new Set();
  rows.forEach(r=>{ seen.add(saleDedupeKey(r)); });
  return seen.size;
}
function hotStatusGroup(st){
  const s=String(st||'').toLowerCase().trim();
  if(['approved','completed'].includes(s)) return s;
  if(s.includes('aprov') || s.includes('approve')) return 'approved';
  if(s.includes('complet') || s.includes('conclu')) return 'completed';
  return s || '__blank__';
}
// Venda única na Hotmart: conta somente a primeira cobrança da assinatura/recorrência.
// Regra solicitada: Sales History Recurrency Number = vazio ou exatamente 1.
// O faturamento soma o valor recebido da linha: parcela recebida ou valor recebido da venda única.
function getRecurrencyValue(r){
  if(!r) return null;
  if(COLS.hotRecurrency && Object.prototype.hasOwnProperty.call(r, COLS.hotRecurrency)) return r[COLS.hotRecurrency];
  if(COLS.hotRecurrency){
    const wanted = normCompact(COLS.hotRecurrency);
    const equivalent = Object.keys(r).find(k=>normCompact(k)===wanted);
    if(equivalent) return r[equivalent];
  }
  const auto = Object.keys(r).find(isRecurrencyHeader);
  return auto ? r[auto] : null;
}
function isFirstRecurrencyValue(val){
  if(val === undefined || val === null) return true;
  const raw = String(val).trim();
  if(raw === '' || raw === '0') return true; // venda única/sem recorrência
  const t = normSpaced(raw);
  if(!t) return true;
  if(/\b(one time|single|unica|unico|avulsa|avista|a vista)\b/.test(t)) return true;
  if(/\b(first|primeira|primeiro)\b/.test(t)) return true;
  if(/\b(second|segunda|segundo|third|terceira|terceiro|quarta|quarto|quinta|quinto)\b/.test(t)) return false;
  const m = t.match(/\d+/);
  if(m) return parseInt(m[0],10) <= 1; // aceita 1, 01, 1/12, 1ª, parcela 1; rejeita 2/12+
  if(/recorr|parcel|installment|subscription|assinatura|cobranca/.test(t)) return false;
  return true;
}
// ==================== CORREÇÃO PRINCIPAL AQUI ====================
function isUniqueHotmartSale(r){
  // REGRA GLOBAL DE QTD DE VENDAS:
  // conta apenas venda única / primeira cobrança. Exemplos aceitos: vazio, 0, 1, 1.0, 1/12, 1ª, "parcela 1".
  // Exemplos excluídos: 2, 2/12, "parcela 2", "segunda cobrança".
  const val = getRecurrencyValue(r);
  if(val !== null && val !== undefined) return isFirstRecurrencyValue(val);

  // Quando a coluna exata não veio na Hotmart-Limpo, ainda tenta encontrar pista
  // em outras colunas e, por último, aplica uma heurística por valor do produto.
  const clue = rowInstallmentClue(r);
  if(clue === 'later') return false;
  if(clue === 'first') return true;

  // SÓ APLICA HEURÍSTICA DE VALOR SE A COLUNA DE RECORRÊNCIA EXISTIR
  // (se não existir, considera tudo como venda única – a dedupe já resolve)
  if(COLS.hotRecurrency && isLikelyInstallmentAmountWithoutRecurrency(r)) return false;
  return true;
}

function normPhone(p){ if(!p) return ''; return String(p).replace(/\D/g,'').slice(-9); }
// Extrai o código do criativo: "B04_PHM_FAZTUDO" → "B04" ; "B04" → "B04"
function extractCode(s){
  if(!s) return '';
  const str = String(s).trim();
  if(str.startsWith('[field')) return ''; // ignora campos não preenchidos da Hotmart
  return str.split(/[_\-\s.|/]+/)[0].toUpperCase();
}
function colFind(headers,patterns){
  if(!headers||!headers.length) return null;
  for(const pat of patterns){
    const f=headers.find(h=>headerForms(h).some(form=>pat.test(form)));
    if(f) return f;
  }
  return null;
}

function toISO(d){ return d.toISOString().slice(0,10); }
function offsetDay(d,n){ const c=new Date(d); c.setDate(c.getDate()+n); return c; }

  COLS.metaThumb   = colFind(mh,[/thumbnail.?url/,/thumbnail/,/image.?url/,/\bthumb\b/]);

  COLS.hotDate     = colFind(hh,[/^sales history order date$/,/^purchase order date$/,/order.?date/,/purchase.?order.?date/,/purchase.?date/,/data.*venda/,/^date$/,/created/]);
  // Data de recebimento/transação: é a data correta para somar faturamento diário, inclusive parcelas recebidas.
  COLS.hotDateBR   = colFind(hh,[/^sales history approved date$/,/^data br$/,/approved.?date/,/payment.?date/,/paid.?date/,/transaction.?date/,/approval.?date/,/data.*pagamento/,/data.*receb/,/data.*transa/,/^data$/]);
  COLS.hotProd     = colFind(hh,[/sales history product name/,/product.?name/,/nome.*produto/,/produto/,/product/]);
  COLS.hotStatus   = colFind(hh,[/sales history transaction status/,/transaction.?status/,/status/]);
  // Valor de faturamento: priorizar o valor REAL da transação/parcela recebida.
  // NÃO usar "Sales History Price", pois ele representa o preço cheio/cadastrado do produto.
  COLS.hotValue    = colFind(hh,[
    /^sales history transaction value$/,
    /^sales history transaction amount$/,
    /sales history.*transaction.*value/,
    /sales history.*transaction.*amount/,
    /transaction.*value/,
    /transaction.*amount/,
    /valor.*transa/,
    /valor.*receb/,
    /received.*value/,
    /paid.*amount/,
    /amount.*paid/,
    /gross.*value/,
    /gross.*amount/,
    /revenue/,
    /valor/
  ]);
  if(COLS.hotValue && /sales history price/i.test(COLS.hotValue)){
    console.warn('[dotb] ATENÇÃO: coluna de valor detectada como Sales History Price. Isso pode somar preço cheio. Ajuste a planilha/override para a coluna de valor da transação/parcela.');

  // Transaction ID da Hotmart — IDENTIFICADOR ÚNICO DE COMPRA. Parcelas da mesma compra

  COLS.hotTxnId    = colFind(hh,[/^sales history transaction$/,/sales.?history.?transaction$/,/sales.?history.?transaction.?id/,/sales.?history.?transaction.?code/,/^transaction$/,/transaction.?id/,/transaction.?code/,/hotmart.?transaction/,/^transa[çc][aã]o$/,/transa[çc][aã]o.?id/,/c[oó]digo.*transa/]);
  // Buyer Name — fallback de identidade quando não há email/telefone.
  COLS.hotBuyer    = colFind(hh,[/^buyer name$/,/sales.?history.?buyer.?name/,/buyer.?name/,/nome.*comprador/]);
  COLS.hotCreative = colFind(hh,[/sales history tracking source sck/,/criativo/,/creative/,/^sck$/,/utm.?content/,/c[oó]digo.*criativo/,/ad.?code/]);
  COLS.hotRecurrency = colFind(hh,[
    /^sales history recurrency number$/,
    /sales.?history.*recurrency.*number/,
    /sales.?history.*recurrence.*number/,
    /sales.?history.*recorr.*number/,
    /^recurrency number$/,
    /recurrency.?number/,
    /recurrence.?number/,
    /recurring.?number/,
    /recorr[eê]ncia.?n[uú]mero/,
    /numero.?recorr/,
    /n[uú]mero.?recorr/,
    /recorr[eê]ncia/,
    /recurrency/,
    /installments?.?number/,
    /installment.?number/,
    /n[uú]mero.?parcela/,
    /parcela.?n[uú]mero/,
    /parcelas?.?number/,
    /installments?/,
    /parcela/,
    /payment.?number/,
    /charge.?number/,
    /cobran[çc]a.*n[uú]mero/
  ]);
  if(!COLS.hotRecurrency){
    COLS.hotRecurrency = hh.find(isRecurrencyHeader) || null;
  }

  // Aba Hotmart COMPLETA/PHM — também usada para QTD global de vendas únicas.
  COLS.hotFullDate     = colFind(fh,[/^sales history order date$/,/^purchase order date$/,/order.?date/,/purchase.?order.?date/,/purchase.?date/,/data.*venda/,/^date$/,/created/]);
  COLS.hotFullDateBR   = colFind(fh,[/^sales history approved date$/,/^data br$/,/approved.?date/,/payment.?date/,/paid.?date/,/transaction.?date/,/approval.?date/,/data.*pagamento/,/data.*receb/,/data.*transa/,/^data$/]);
  COLS.hotFullEmail    = colFind(fh,[/sales history buyer email/,/buyer.?email/,/e-?mail/,/email/]);
  COLS.hotFullProd     = colFind(fh,[/sales history product name/,/product.?name/,/nome.*produto/,/produto/,/product/]);
  COLS.hotFullStatus   = colFind(fh,[/sales history transaction status/,/transaction.?status/,/status/]);
  COLS.hotFullPhone    = colFind(fh,[/buyer.?phone/,/phone/,/telefone/,/celular/,/whatsapp/,/ddd/,/tel\b/]);
  COLS.hotFullValue    = colFind(fh,[
    /^sales history transaction value$/,
    /^sales history transaction amount$/,
    /sales history.*transaction.*value/,
    /sales history.*transaction.*amount/,
    /transaction.*value/,
    /transaction.*amount/,
    /valor.*transa/,
    /valor.*receb/,
    /received.*value/,
    /paid.*amount/,
    /amount.*paid/,
    /gross.*value/,
    /gross.*amount/,
    /revenue/,
    /valor/
  ]);
  COLS.hotFullTxnId    = colFind(fh,[/^sales history transaction$/,/sales.?history.?transaction$/,/sales.?history.?transaction.?id/,/sales.?history.?transaction.?code/,/^transaction$/,/transaction.?id/,/transaction.?code/,/hotmart.?transaction/,/^transa[çc][aã]o$/,/transa[çc][aã]o.?id/,/c[oó]digo.*transa/]);
  COLS.hotFullBuyer    = colFind(fh,[/^buyer name$/,/sales.?history.?buyer.?name/,/buyer.?name/,/nome.*comprador/]);
  COLS.hotFullRecurrency = colFind(fh,[
    /^sales history recurrency number$/,
    /sales.?history.*recurrency.*number/,
    /sales.?history.*recurrence.*number/,
    /sales.?history.*recorr.*number/,
    /^recurrency number$/,
    /recurrency.?number/,
    /recurrence.?number/,
    /recurring.?number/,
    /recorr[eê]ncia.?n[uú]mero/,
    /numero.?recorr/,
    /n[uú]mero.?recorr/,
    /recorr[eê]ncia/,
    /recurrency/,
    /installments?.?number/,
    /installment.?number/,
    /n[uú]mero.?parcela/,
    /parcela.?n[uú]mero/,
    /parcelas?.?number/,
    /installments?/,
    /parcela/,
    /payment.?number/,
    /charge.?number/,

  ]);
  if(!COLS.hotFullRecurrency){
    COLS.hotFullRecurrency = fh.find(isRecurrencyHeader) || null;

  COLS.phmEmail    = colFind(ph,[/e-?mail/,/email/]);

  // Aplica overrides manuais
  Object.keys(COL_OVERRIDE).forEach(k=>{ if(COL_OVERRIDE[k]) COLS[k]=COL_OVERRIDE[k]; });

  if(!COL_OVERRIDE.hotValue){
    const sumOf=c=>{ let s=0; RAW.hotmart.forEach(r=>{ if(['approved','completed'].includes(hotStatusGroup(r[COLS.hotStatus]))) s+=parseMoney(r[c]); }); return s; };

  // Cobertura de datas na Hotmart (Purchase Order Date + fallback Data BR)
  if(RAW.hotmart.length){

    RAW.hotmart.forEach(r=>{

    const stCount={}; let grossAll=0, okAll=0, uniqueAll=0, recurringIgnored=0;
    RAW.hotmart.forEach(r=>{
      const st=hotStatusGroup(r[COLS.hotStatus]);
      stCount[st]=(stCount[st]||0)+1;
      if(['approved','completed'].includes(st)){
        okAll++;

    });
    console.log('[dotb] Status Hotmart-Limpo:', stCount);

        +'Para máxima precisão, verifique o nome exato da coluna na planilha ou ajuste COL_OVERRIDE.hotRecurrency.');
    }
  }

// ═══ DATE BOUNDS ═══
function computeDateBounds(){
  const all=[];
  RAW.meta.forEach(r=>{ const d=parseDate(r[COLS.metaDate]); if(d) all.push(d); });
  RAW.hotmart.forEach(r=>{ const dr=hotRevenueDate(r), ds=hotSaleDate(r); if(dr) all.push(dr); if(ds) all.push(ds); });
  if(!all.length){ DATE_MIN=toISO(offsetDay(new Date(),-30)); DATE_MAX=toISO(new Date()); return; }
  all.sort(); DATE_MIN=all[0]; DATE_MAX=all[all.length-1];
}
function asLocalDate(iso){
  if(!iso) return null;
  const [y,m,d]=String(iso).split('-').map(Number);
  if(!y||!m||!d) return null;
  return new Date(y,m-1,d);
}
function addMonthsLocal(d,n){
  const c=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  const day=c.getDate();
  c.setMonth(c.getMonth()+n);
  if(c.getDate()<day) c.setDate(0);
  return c;
}
function fmtDateBR(iso){
  const d=asLocalDate(iso);
  return d?d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'}):'';
}
function monthNamePT(d){
  return d.toLocaleDateString('pt-BR',{month:'long'}).replace(/^./,c=>c.toUpperCase());
}
function presetLabel(preset){
  if(preset==='all') return 'Todo período';
  if(String(preset).endsWith('m')) return 'Últimos '+String(preset).replace('m','')+' meses';
  return 'Últimos '+preset+' dias';
}
function presetRange(preset){
  const toD=asLocalDate(DATE_MAX)||new Date();
  let fromD;
  if(preset==='all') fromD=asLocalDate(DATE_MIN)||offsetDay(toD,-365);
  else if(String(preset).endsWith('m')) fromD=addMonthsLocal(toD,-parseInt(preset));
  else fromD=offsetDay(toD,-(parseInt(preset)-1));
  return {from:toISO(fromD),to:toISO(toD)};
}
function syncDateDisplays(from,to){
  const f=document.getElementById('dateFromDisplay'), t=document.getElementById('dateToDisplay');
  if(f) f.value=fmtDateBR(from);
  if(t) t.value=fmtDateBR(to);
}
function markPresetActive(preset){
  document.querySelectorAll('.hm-preset-grid .p-opt').forEach(o=>o.classList.toggle('active',o.dataset.preset===String(preset)));
}
function setDateRange(from,to,preset='custom',renderCalendar=true){
  document.getElementById('dateFrom').value=from;
  document.getElementById('dateTo').value=to;
  syncDateDisplays(from,to);
  markPresetActive(preset);
  setText('periodBtnLabel', preset==='custom'?'Customizado':presetLabel(preset));
  DP.draftFrom=from; DP.draftTo=to; DP.draftPreset=preset;
  DP.viewDate=asLocalDate(to)||new Date();
  if(renderCalendar) renderDateCalendar();
}
function applyPreset(preset){
  const r=presetRange(preset);
  setDateRange(r.from,r.to,preset,true);
}
function setDraftPreset(preset){
  const r=presetRange(preset);
  DP.draftFrom=r.from; DP.draftTo=r.to; DP.draftPreset=preset; DP.viewDate=asLocalDate(r.to)||new Date();
  syncDateDisplays(DP.draftFrom,DP.draftTo);
  markPresetActive(preset);
  renderDateCalendar();
}
function openDatePicker(){
  DP.draftFrom=document.getElementById('dateFrom').value;
  DP.draftTo=document.getElementById('dateTo').value;
  DP.viewDate=asLocalDate(DP.draftTo)||asLocalDate(DATE_MAX)||new Date();
  syncDateDisplays(DP.draftFrom,DP.draftTo);
  renderDateCalendar();
}
function renderDateCalendar(){
  const grid=document.getElementById('calGrid');
  if(!grid) return;
  const base=DP.viewDate||asLocalDate(DATE_MAX)||new Date();
  setText('calMonthLabel',monthNamePT(base));
  setText('calYearLabel',String(base.getFullYear()).slice(-2));
  const first=new Date(base.getFullYear(),base.getMonth(),1);
  const start=new Date(first); start.setDate(first.getDate()-first.getDay());
  const today=toISO(new Date());
  const min=DATE_MIN||'0000-00-00', max=DATE_MAX||'9999-12-31';
  const from=DP.draftFrom, to=DP.draftTo||DP.draftFrom;
  let html='';
  for(let i=0;i<42;i++){
    const d=new Date(start); d.setDate(start.getDate()+i);
    const iso=toISO(d);
    const out=d.getMonth()!==base.getMonth();
    const selected=iso===from||iso===to;
    const inRange=from&&to&&iso>from&&iso<to;
    const disabled=iso<min||iso>max;
    html+='<button type="button" class="hm-day '+(out?'out ':'')+(selected?'selected ':'')+(inRange?'in-range ':'')+(iso===today?'today ':'')+'" data-date="'+iso+'" '+(disabled?'disabled':'')+'>'+d.getDate()+'</button>';
  }
  grid.innerHTML=html;
  grid.querySelectorAll('.hm-day:not([disabled])').forEach(btn=>btn.addEventListener('click',()=>{
    const iso=btn.dataset.date;
    if(!DP.draftFrom || (DP.draftFrom&&DP.draftTo)){
      DP.draftFrom=iso; DP.draftTo='';
    }else{
      if(iso<DP.draftFrom){ DP.draftTo=DP.draftFrom; DP.draftFrom=iso; }
      else DP.draftTo=iso;
    }
    DP.draftPreset='custom';
    markPresetActive('custom');
    syncDateDisplays(DP.draftFrom,DP.draftTo||DP.draftFrom);
    renderDateCalendar();
  }));
}

// ═══ FILTER DATA ═══
function filterMeta(f){
  return RAW.meta.filter(r=>{
    const d=parseDate(r[COLS.metaDate]); if(!d||d<f.from||d>f.to) return false;
    if(f.camps && !f.camps.includes(r[COLS.metaCamp])) return false;
    return true;
  });
}
function hotPassCommonFilters(r,f){
  if(f.prods && !f.prods.includes(r[COLS.hotProd])) return false;
  const st=hotStatusGroup(r[COLS.hotStatus]);
  return f.statuses.some(s=> s==='__other__' ? !['approved','completed'].includes(st) : st===s);
}
// FATURAMENTO: soma TODAS as transações do período (venda única + parcelas recebidas).
// Usa o eixo de data único (hotKpiDate), então o faturamento aparece no mesmo dia da venda.
function filterHotmartRevenue(f){
  return RAW.hotmart.filter(r=>{
    const d=hotKpiDate(r); if(!d||d<f.from||d>f.to) return false;
    return hotPassCommonFilters(r,f);
  });
}
// QUANTIDADE DE VENDAS: mesmo período/eixo de data, mas só a 1ª cobrança
// (recurrency vazio ou =1). A dedupe por e-mail é feita na contagem (countUniqueSales).
function filterHotmartSales(f){
  return RAW.hotmart.filter(r=>{
    const d=hotKpiDate(r); if(!d||d<f.from||d>f.to) return false;
    if(!isUniqueHotmartSale(r)) return false; // exclui parcelas/recorrências
    return hotPassCommonFilters(r,f);
  });
}
// Alias mantido para compatibilidade: retorna linhas de receita (inclui parcelas).
function filterHotmart(f){ return filterHotmartRevenue(f); }


// ═══ QTD GLOBAL DE VENDAS ÚNICAS ═══
// A quantidade de vendas/CAC usa uma fonte unificada:
//   1) Hotmart-Limpo (KPIs/faturamento)
//   2) Hotmart-PHM (produtos do funil PHM e produtos futuros)
// O faturamento continua vindo da Hotmart-Limpo para não duplicar parcelas/receita.
function getFirstExistingValue(r, cols){
  for(const c of cols){
    if(c && Object.prototype.hasOwnProperty.call(r,c)) return r[c];
  }
  return '';
}
function getSourceCols(source){
  if(source==='full'){
    return {
      name:'Hotmart-PHM', date:COLS.hotFullDate, dateBR:COLS.hotFullDateBR, prod:COLS.hotFullProd,
      status:COLS.hotFullStatus, value:COLS.hotFullValue, email:COLS.hotFullEmail,
      phone:COLS.hotFullPhone, txn:COLS.hotFullTxnId, buyer:COLS.hotFullBuyer,
      recurrency:COLS.hotFullRecurrency
    };
  }
  return {
    name:'Hotmart-Limpo', date:COLS.hotDate, dateBR:COLS.hotDateBR, prod:COLS.hotProd,
    status:COLS.hotStatus, value:COLS.hotValue, email:COLS.hotEmail,
    phone:COLS.hotPhone, txn:COLS.hotTxnId, buyer:COLS.hotBuyer,
    recurrency:COLS.hotRecurrency
  };
}
function sourceHotDate(r, c){
  if(DATE_BASIS==='cash'){
    return (c.dateBR ? parseDate(r[c.dateBR]) : null) || (c.date ? parseDate(r[c.date]) : null);
  }
  return (c.date ? parseDate(r[c.date]) : null) || (c.dateBR ? parseDate(r[c.dateBR]) : null);
}
function sourceRecurrencyValue(r, c){
  if(!r) return null;
  if(c.recurrency && Object.prototype.hasOwnProperty.call(r, c.recurrency)) return r[c.recurrency];
  if(c.recurrency){
    const wanted = normCompact(c.recurrency);
    const equivalent = Object.keys(r).find(k=>normCompact(k)===wanted);
    if(equivalent) return r[equivalent];
  }
  const auto = Object.keys(r).find(isRecurrencyHeader);
  return auto ? r[auto] : null;
}
function sourceSaleFields(r, source){
  const c=getSourceCols(source);
  const date=sourceHotDate(r,c);
  const product=c.prod ? String(r[c.prod]||'').trim() : '';
  const email=c.email ? String(r[c.email]||'').trim().toLowerCase() : '';
  const phone=c.phone ? normPhone(r[c.phone]) : '';
  const buyer=c.buyer ? String(r[c.buyer]||'').trim().toLowerCase() : '';
  const txn=c.txn ? String(r[c.txn]||'').trim() : '';
  const value=c.value ? parseMoney(r[c.value]) : 0;
  const status=hotStatusGroup(c.status ? r[c.status] : '');
  const recurrency=sourceRecurrencyValue(r,c);
  return {raw:r, source, sourceName:c.name, date, product, email, phone, buyer, txn, value, status, recurrency};
}
function productSourceKey(name){
  // Normaliza o nome do produto para comparar a mesma oferta entre fontes diferentes.
  // Ex.: "Formação Full Stack Marketing" e variações de maiúsculas/acentos viram a mesma chave.
  return normSpaced(name || '') || '__sem_produto__';
}
function sourceSaleKey(sale){
  // Transaction ID continua sendo prioridade; quando não existe, usa comprador + data + produto.
  if(sale.txn) return 'txn:'+sale.txn;
  let identity = '';
  if(sale.email) identity='mail:'+sale.email;
  else if(sale.phone) identity='tel:'+sale.phone;
  else if(sale.buyer) identity='name:'+sale.buyer;
  else identity='anon';
  const d=(sale.date||'').slice(0,10);
  const p=productSourceKey(sale.product);
  return identity+'|'+d+'|'+p;
}
function getLimpoProductKeys(){
  const keys=new Set();
  RAW.hotmart.forEach(r=>{
    const p=COLS.hotProd ? String(r[COLS.hotProd]||'').trim() : '';
    if(p) keys.add(productSourceKey(p));
  });
  return keys;
}
// ==================== CORREÇÃO PRINCIPAL AQUI ====================
function isUniqueSourceSale(sale){
  // Se a coluna de recorrência existe e tem valor, usa ela
  if(sale.recurrency !== null && sale.recurrency !== undefined){
    return isFirstRecurrencyValue(sale.recurrency);
  }

  // Se a coluna de recorrência NÃO existe para esta fonte, considera tudo como venda única
  // (a dedupe por Transaction ID/email+data+produto já agrupa parcelas da mesma compra)
  if((sale.source === 'limpo' && !COLS.hotRecurrency) ||
     (sale.source === 'full' && !COLS.hotFullRecurrency)){
    return true;
  }

  // Fallback (caso a coluna exista mas venha vazia) – tenta pistas textuais
  const clue = rowInstallmentClue(sale.raw);
  if(clue === 'later') return false;
  if(clue === 'first') return true;

  // Último recurso: heurística por valor (só se a coluna existe, para não descartar à toa)
  if(sale.source === 'limpo' && COLS.hotRecurrency && isLikelyInstallmentAmountWithoutRecurrency(sale.raw)) return false;
  if(sale.source === 'full' && COLS.hotFullRecurrency && isLikelyInstallmentAmountWithoutRecurrency(sale.raw)) return false;

  return true;
}
// ===============================================================
function salePassFilters(sale,f){
  if(!sale.date || sale.date<f.from || sale.date>f.to) return false;
  if(f.prods && !f.prods.includes(sale.product)) return false;
  return f.statuses.some(st=> st==='__other__' ? !['approved','completed'].includes(sale.status) : sale.status===st);
}
function filterGlobalHotmartSales(f){
  const all=[];
  const limpoProductKeys=getLimpoProductKeys();
  const skippedFullProducts=new Set();

  // REGRA CANÔNICA:
  // 1) Hotmart-Limpo é a fonte oficial para produtos que já existem nela.
  // 2) Hotmart-PHM entra SOMENTE para produtos ausentes na Hotmart-Limpo
  //    (ex.: Plano Head de Marketing e produtos futuros que ainda não estiverem na aba limpa).
  // Isso evita o erro de contar Full Stack pela Hotmart-PHM e comparar com o relatório
  // da Hotmart-Limpo/faturamento, gerando 32 vendas quando a Hotmart mostra 27 transações.
  RAW.hotmart.forEach(r=>{
    const sale=sourceSaleFields(r,'limpo');
    if(!salePassFilters(sale,f)) return;
    if(!isUniqueSourceSale(sale)) return;
    sale.key=sourceSaleKey(sale);
    all.push(sale);
  });
  RAW.hotmartFull.forEach(r=>{
    const sale=sourceSaleFields(r,'full');
    if(!salePassFilters(sale,f)) return;
    const pKey=productSourceKey(sale.product);
    if(limpoProductKeys.has(pKey)){
      if(sale.product) skippedFullProducts.add(sale.product);
      return;
    }
    if(!isUniqueSourceSale(sale)) return;
    sale.key=sourceSaleKey(sale);
    all.push(sale);
  });

  const byKey=new Map();
  all.forEach(sale=>{
    if(!sale.key) return;
    const old=byKey.get(sale.key);
    if(!old || old.source!=='limpo') byKey.set(sale.key,sale);
  });
  const out=[...byKey.values()];
  if(skippedFullProducts.size){
    console.log('[dotb] Produtos ignorados da Hotmart-PHM na QTD global porque já existem na Hotmart-Limpo:', [...skippedFullProducts].sort());
  }
  return out;
}
function countGlobalSales(rows){
  const seen=new Set();
  rows.forEach(r=>{ if(r.key) seen.add(r.key); });
  return seen.size;
}
function productSalesSummary(rows){
  const by={};
  rows.forEach(r=>{
    const p=r.product||'(sem produto)';
    if(!by[p]) by[p]={produto:p,vendas:0, fontes:new Set()};
    by[p].vendas++;
    by[p].fontes.add(r.sourceName);
  });
  return Object.values(by).sort((a,b)=>b.vendas-a.vendas || a.produto.localeCompare(b.produto));
}

// ═══ VENDAS (1ª parcela) × FATURAMENTO (todas as parcelas) POR PRODUTO ═══
// Para cada produto:
//   • Vendas        = só venda única / 1ª parcela (isUniqueSourceSale) + dedupe por compra.
//   • Faturamento   = soma de TODAS as transações do produto (1ª parcela + parcelas seguintes).
// Mesma regra canônica das demais seções: Hotmart-Limpo manda; Hotmart-PHM só entra
// para produtos que ainda NÃO existem na aba limpa.
function productBreakdown(f){
  const limpoProductKeys = getLimpoProductKeys();
  const byProduct = {};

  function bucketFor(name){
    const key = productSourceKey(name);
    if(!byProduct[key]) byProduct[key] = {produto:(name||'').trim()||'(sem produto)', saleKeys:new Set(), faturamento:0, parcelas:0, fontes:new Set()};
    return byProduct[key];
  }
  function consume(r, source){
    const sale = sourceSaleFields(r, source);
    if(!salePassFilters(sale, f)) return;
    // PHM só entra para produtos que NÃO existem na Hotmart-Limpo (mesma regra da QTD global)
    if(source==='full' && limpoProductKeys.has(productSourceKey(sale.product))) return;
    const b = bucketFor(sale.product);
    b.fontes.add(sale.sourceName);
    b.faturamento += sale.value;          // FATURAMENTO: todas as parcelas
    if(isUniqueSourceSale(sale)){         // VENDAS: só 1ª parcela / venda única
      sale.key = sourceSaleKey(sale);
      if(sale.key) b.saleKeys.add(sale.key);
    }else{
      b.parcelas++;                       // parcelas seguintes → só no faturamento
    }
  }

  RAW.hotmart.forEach(r=>consume(r,'limpo'));
  RAW.hotmartFull.forEach(r=>consume(r,'full'));

  return Object.values(byProduct)
    .map(b=>({produto:b.produto, vendas:b.saleKeys.size, faturamento:b.faturamento, parcelas:b.parcelas, fontes:[...b.fontes].join(' + ')}))
    .filter(p=>p.vendas>0 || p.faturamento>0)
    .sort((a,b)=> b.faturamento - a.faturamento || b.vendas - a.vendas || a.produto.localeCompare(b.produto));
}

function renderProductBreakdown(f){
  const body = document.getElementById('tblProdBreak');
  const foot = document.getElementById('tblProdBreakFoot');
  if(!body) return;
  const rows = productBreakdown(f);
  if(!rows.length){
    body.innerHTML='<tr><td colspan="4" style="text-align:center;color:var(--gray-2);padding:32px;">Nenhuma venda no período / seleção</td></tr>';
    if(foot) foot.innerHTML=''; return;
  }
  body.innerHTML = rows.map(p=>(
    '<tr>'+
      '<td class="cr-name" title="'+escAttr(p.produto)+'">'+p.produto+'</td>'+
      '<td>'+fmtN(p.vendas)+'</td>'+
      '<td>'+money2(p.faturamento)+'</td>'+
      '<td style="color:var(--gray)">'+p.fontes+'</td>'+
    '</tr>'
  )).join('');
  const tV = rows.reduce((s,p)=>s+p.vendas,0);
  const tF = rows.reduce((s,p)=>s+p.faturamento,0);
  if(foot) foot.innerHTML='<tr><td class="cr-name">Total</td><td>'+fmtN(tV)+'</td><td>'+money2(tF)+'</td><td></td></tr>';

  console.log('%c[dotb] Vendas (1ª parcela) × Faturamento (todas) por produto:','color:#4dffa7;font-weight:bold');
  console.table(rows.map(p=>({Produto:p.produto,'Vendas (1ª parcela)':p.vendas,'Faturamento':money2(p.faturamento),'Parcelas seguintes':p.parcelas,'Fonte(s)':p.fontes})));
}

// ═══ RENDER ═══
function render(){
  if(!RAW.meta.length && !RAW.hotmart.length){ return; }
  const f=getFilters();
  const meta=filterMeta(f);
  const hotRevenue=filterHotmartRevenue(f);
  const hotSales=filterGlobalHotmartSales(f);

  // Meta aggregates
  let invest=0,impr=0,clicks=0,pviews=0,checkout=0,purchMeta=0,purchValMeta=0;
  const byDay={};
  meta.forEach(r=>{
    const sp=parseMoney(r[COLS.metaSpend]);
    invest+=sp; impr+=num(r[COLS.metaImpr]); clicks+=num(r[COLS.metaClick]);
    pviews+=num(r[COLS.metaPageView]); checkout+=num(r[COLS.metaCheckout]);
    purchMeta+=num(r[COLS.metaPurch]); purchValMeta+=parseMoney(r[COLS.metaPurchVal]);
    const d=parseDate(r[COLS.metaDate]);
    if(d){ (byDay[d]=byDay[d]||{invest:0,bruto:0}).invest+=sp; }
  });

  // Hotmart aggregates
  // Faturamento: soma todas as parcelas pela data de recebimento/transação.
  // Vendas: conta apenas vendas únicas pela data da compra original.
  let bruto=0;
  hotRevenue.forEach(r=>{
    const v=parseMoney(r[COLS.hotValue]); bruto+=v;
    const d=hotKpiDate(r);
    if(d){
      const dayData = (byDay[d]=byDay[d]||{invest:0,bruto:0,vendas:0});
      dayData.bruto+=v;
    }
  });
  // Vendas por dia também usam a chave de dedupe (Transaction ID se disponível, senão
  // identidade + data truncada + produto). Mesma lógica do countUniqueSales.
  const daySaleKeys={};
  hotSales.forEach(sale=>{
    const d=sale.date;
    if(!d) return;
    const dayData = (byDay[d]=byDay[d]||{invest:0,bruto:0,vendas:0});
    const k = sale.key;
    const set = (daySaleKeys[d]=daySaleKeys[d]||new Set());
    if(k && !set.has(k)){ set.add(k); dayData.vendas+=1; }
  });
  const vendas=countGlobalSales(hotSales);   // VENDAS ÚNICAS globais: Hotmart-Limpo + Hotmart-PHM, sem parcelas
  console.log('[dotb] Verificação RENDER - hotSales.length:', hotSales.length);
  const liquido=bruto-invest;
  const roas=invest>0?bruto/invest:0;      // ROAS = faturamento bruto (todas as parcelas) / investimento
  const cac=vendas>0?invest/vendas:0;      // CAC = investimento / vendas únicas
  const cpm=impr>0?(invest/impr)*1000:0;
  const cpc=clicks>0?invest/clicks:0;
  const cpv=pviews>0?invest/pviews:0;
  const cpck=checkout>0?invest/checkout:0;
  const cpa=vendas>0?invest/vendas:0;      // CPA = investimento / vendas únicas
  const connRate=clicks>0?pviews/clicks:0;          // Connect Rate = Visualização de página / Link Clicks
  const checkRate=pviews>0?checkout/pviews:0;        // Início de checkout / Visualização de página
  const convRate=pviews>0?vendas/pviews:0; // Taxa de conversão = vendas únicas / visualizações de página

  // Log de diagnóstico por período filtrado
  console.log(
    '%c[dotb] RENDER (período: '+f.from+' → '+f.to+'):\n'
    +'  • Faturamento bruto (todas as parcelas): R$ '+fmtM(bruto)+'\n'
    +'  • Vendas únicas finais globais (fonte canônica + 1ª parcela + dedupe): '+vendas+'\n'
    +'  • Linhas de receita (inclui parcelas): '+hotRevenue.length+'\n'
    +'  • Linhas pré-dedupe globais (fonte canônica + 1ª parcela): '+hotSales.length+'\n'
    +'  • Linhas colapsadas pela chave composta: '+Math.max(0, hotSales.length - vendas),
    'color:#4dffa7;font-weight:bold'
  );

  const prodSales=productSalesSummary(hotSales);
  if(prodSales.length){
    console.log('%c[dotb] Vendas únicas por produto (regra global; Hotmart-Limpo + produtos exclusivos Hotmart-PHM):','color:#4dffa7;font-weight:bold');
    console.table(prodSales.map(p=>({Produto:p.produto,'Vendas únicas':p.vendas,'Fonte(s)':[...p.fontes].join(' + ')})));
  }

  // Detalhe extra: lista as linhas que foram para a contagem de vendas únicas
  if(hotSales.length && hotSales.length < 40){
    console.log('%c[dotb] Linhas usadas na contagem de vendas únicas (só 1ª parcela; chave dedupe na última coluna):','color:#4dffa7');
    console.table(hotSales.map(s=>({
      'Fonte': s.sourceName,
      'Buyer Name': s.buyer || '(vazio/não detectado)',
      'Transaction': s.txn || '(vazio/não detectado)',
      'Data venda': s.date || '',
      'Email': s.email || '',
      'Produto': s.product || '',
      'Status': s.status || '',
      'Recurrency': (s.recurrency===null || s.recurrency===undefined || String(s.recurrency).trim()==='') ? '(vazio/sem recorrência)' : s.recurrency,
      'Valor': s.value,
      'Chave dedupe': s.key
    })));
  }

  // KPIs
  setText('kVendas',fmtN(vendas));
  setText('kBruto',fmtM(bruto));
  setText('kInvest',fmtM(invest));
  setText('kLiquido',fmtM(Math.abs(liquido)));
  document.getElementById('kLiquidoSub').innerHTML = liquido>=0 ? '<span class="badge badge-green">▲ lucro</span>' : '<span class="badge badge-red">▼ prejuízo</span>';
  setText('kROAS',fmtR(roas));
  setText('kCAC',fmtM(cac));

  // Funil Meta
  setText('fImpressoes',fmtN(impr));
  setText('fCliques',fmtN(clicks));
  setText('fPageViews',fmtN(pviews));
  setText('fCheckout',fmtN(checkout));
  setText('fVendas',fmtN(vendas));
  setText('fCPMr','R$ '+fmtM(cpm));
  setText('fCPCr','R$ '+fmtM(cpc));
  setText('fCPVr','R$ '+fmtM(cpv));
  setText('fCPC2r','R$ '+fmtM(cpck));
  setText('fCPAr','R$ '+fmtM(cpa));
  setText('fConnRate',fmtP(connRate));
  setText('fCheckRate',fmtP(checkRate));
  setText('fConvRate',fmtP(convRate));

  // Chart
  renderChart(byDay);

  // Table — criativos Meta Ads × vendas do próprio Meta Ads (sem cruzar com Hotmart/SCK)
  renderTable(meta);

  // Vendas (1ª parcela) × Faturamento (todas) por produto
  renderProductBreakdown(f);

  // Funil PHM
  renderPHM();
}

// ═══ CHART ═══
function renderChart(byDay){
  const days=Object.keys(byDay).sort();
  const fat=days.map(d=>byDay[d].bruto||0);
  const inv=days.map(d=>byDay[d].invest||0);
  const rs=days.map((d,i)=>inv[i]>0?fat[i]/inv[i]:0);
  const ctx=document.getElementById('chartDaily').getContext('2d');
  if(chartInstance) chartInstance.destroy();
  chartInstance=new Chart(ctx,{
    type:'line',
    data:{labels:days,datasets:[
      {label:'Faturamento',data:fat,borderColor:'#4dffa7',backgroundColor:'rgba(77,255,167,.06)',borderWidth:2,tension:.35,pointRadius:2,fill:true,yAxisID:'y'},
      {label:'Investimento',data:inv,borderColor:'#e8a13c',backgroundColor:'rgba(232,161,60,.06)',borderWidth:2,tension:.35,pointRadius:2,fill:true,yAxisID:'y'},
      {label:'ROAS',data:rs,borderColor:'#3b8bff',borderWidth:1.5,tension:.35,pointRadius:2,borderDash:[4,3],yAxisID:'y2'}
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#1c1c19',borderColor:'#2e2e2b',borderWidth:1,titleColor:'#f6f4ef',bodyColor:'#aaa',padding:10,callbacks:{label:c=>c.dataset.label==='ROAS'?' ROAS: '+fmtR(c.raw):' '+c.dataset.label+': R$ '+fmtM(c.raw)}}},
      scales:{
        x:{grid:{color:'#2e2e2b'},ticks:{color:'#55554f',font:{size:9},maxRotation:0,autoSkip:true,maxTicksLimit:12}},
        y:{grid:{color:'#2e2e2b'},ticks:{color:'#888',font:{size:9},callback:v=>'R$'+fmtN(v)},position:'left'},
        y2:{grid:{display:false},ticks:{color:'#3b8bff',font:{size:9},callback:v=>v.toFixed(1)+'x'},position:'right'}
      }
    }
  });
}

// ═══ TABLE — criativos Meta Ads × vendas do próprio Meta Ads ═══
// A tabela abaixo NÃO cruza com Hotmart/SCK. A coluna Vendas vem direto do Meta Ads
// pela coluna COLS.metaPurch, travada como "Action Omni Purchase".
function renderTable(meta){
  // Agrupa investimento/KPIs da Meta por CÓDIGO de criativo
  const byCode={};
  meta.forEach(r=>{
    const fullName=(r[COLS.metaAd]||r[COLS.metaCamp]||'Sem nome');
    const code=extractCode(fullName)||fullName.toUpperCase();
    const a=byCode[code]=byCode[code]||{code,names:new Set(),invest:0,impr:0,clicks:0,vendas:0,permalink:'',thumb:''};
    a.names.add(fullName);
    a.invest+=parseMoney(r[COLS.metaSpend]);
    a.impr+=num(r[COLS.metaImpr]);
    a.clicks+=num(r[COLS.metaClick]);   // CLIQUES = Link Clicks
    a.vendas+=num(r[COLS.metaPurch]);   // VENDAS = Action Omni Purchase do Meta Ads
    if(!a.permalink){ const pl=String(r[COLS.metaPermalink]||'').trim(); if(pl) a.permalink=pl; }
    if(!a.thumb){ const th=String(r[COLS.metaThumb]||'').trim(); if(th) a.thumb=th; }
  });

  console.log('%c[dotb] Tabela Criativos vs KPIs usando vendas do Meta Ads (sem Hotmart/SCK).','color:#89cc72;font-weight:bold');
  console.log('%c[dotb] Coluna de vendas Meta detectada:','color:#89cc72', COLS.metaPurch||'(não detectada)');

  const rows=Object.values(byCode);
  // Monta as linhas com todas as métricas já calculadas
  TABLE_ROWS=rows.map(m=>{
    const ctr=m.impr>0?m.clicks/m.impr:0;          // CTR = Link Clicks / Impressões
    const cpc=m.clicks>0?m.invest/m.clicks:0;       // CPC = Investimento / Link Clicks
    return {code:m.code, name:[...m.names][0]||m.code, invest:m.invest, impr:m.impr, clicks:m.clicks,
            ctr, cpc, vendas:m.vendas, permalink:m.permalink, thumb:m.thumb};
  });
  // Totais (independentes da ordenação)
  let tI=0,tImp=0,tC=0,tV=0;
  TABLE_ROWS.forEach(m=>{ tI+=m.invest;tImp+=m.impr;tC+=m.clicks;tV+=m.vendas; });
  TABLE_TOTALS={invest:tI,impr:tImp,clicks:tC,ctr:tImp>0?tC/tImp:0,cpc:tC>0?tI/tC:0,vendas:tV};
  paintTable();
}

// Ordena e desenha a tabela conforme SORT
function paintTable(){
  const body=document.getElementById('tblCreativos');
  const foot=document.getElementById('tblFoot');
  if(!TABLE_ROWS.length){
    body.innerHTML='<tr><td colspan="9" style="text-align:center;color:var(--gray-2);padding:32px;">Nenhum dado no período / seleção</td></tr>';
    foot.innerHTML=''; updateSortIndicators(); return;
  }
  const {key,dir}=SORT, mul=dir==='asc'?1:-1;
  const sorted=[...TABLE_ROWS].sort((a,b)=>{
    if(key==='code'||key==='name'){ return mul*String(a[key]).localeCompare(String(b[key]),'pt-BR'); }
    let x=a[key], y=b[key];
    x=(x===null||x===undefined)?-Infinity:x;
    y=(y===null||y===undefined)?-Infinity:y;
    return mul*(x-y);
  });
  body.innerHTML=sorted.map(m=>{
    const label='<strong style="color:var(--off)">'+m.code+'</strong> <span style="color:var(--gray-2);font-size:10px">'+(m.name!==m.code?m.name:'')+'</span>';
    const thumbCell=m.thumb?'<img class="cr-thumb" src="'+escAttr(m.thumb)+'" loading="lazy" referrerpolicy="no-referrer" alt="" onerror="dotbImgFail(this)">':'<span class="cr-noimg">—</span>';
    const linkCell=m.permalink?'<a class="ig-link" href="'+escAttr(m.permalink)+'" target="_blank" rel="noopener" title="Abrir no Instagram">'+IG_SVG+'</a>':'<span style="color:var(--gray-2)">—</span>';
    return '<tr>'+
      '<td class="cr-thumb-cell">'+thumbCell+'</td>'+
      '<td class="cr-name" title="'+escAttr(m.name)+'">'+label+'</td>'+
      '<td>'+money0(m.invest)+'</td>'+
      '<td>'+fmtN(m.impr)+'</td>'+
      '<td>'+fmtN(m.clicks)+'</td>'+
      '<td>'+fmtP(m.ctr)+'</td>'+
      '<td>'+money2(m.cpc)+'</td>'+
      '<td>'+fmtN(m.vendas)+'</td>'+
      '<td>'+linkCell+'</td>'+
    '</tr>';
  }).join('');
  const t=TABLE_TOTALS;
  foot.innerHTML='<tr><td></td><td class="cr-name">Total</td><td>'+money0(t.invest)+'</td><td>'+fmtN(t.impr)+'</td><td>'+fmtN(t.clicks)+'</td><td>'+fmtP(t.ctr)+'</td><td>'+money2(t.cpc)+'</td><td>'+fmtN(t.vendas)+'</td><td></td></tr>';
  updateSortIndicators();
}

// Atualiza as setinhas ▲▼ nos cabeçalhos
function updateSortIndicators(){
  document.querySelectorAll('#table-sec th.sortable').forEach(th=>{
    const active=th.dataset.sort===SORT.key;
    th.classList.toggle('sort-active',active);
    const car=th.querySelector('.sort-caret');
    if(car) car.textContent = active ? (SORT.dir==='asc'?'▲':'▼') : '';
  });
}

// ═══ FUNIL PHM ═══
function renderPHM(){
  const wrap=document.getElementById('phmFunnel');
  if(!RAW.phm.length){ wrap.innerHTML='<div class="empty"><div class="big">∅</div>Sem dados de Lead PHM</div>'; return; }
  if(!RAW.hotmartFull.length){ wrap.innerHTML='<div class="empty"><div class="big">∅</div>Sem dados da Hotmart-PHM</div>'; return; }

  const norm = s => String(s||'').toLowerCase().trim();
  const matchKw = (name,kws) => kws.some(k=>name.includes(k));

  // Fonte do cruzamento PHM: aba Hotmart específica (gid 721086669), conforme solicitado.
  const src = RAW.hotmartFull;
  const cEmail  = COLS.hotFullEmail;
  const cProd   = COLS.hotFullProd;
  const cStatus = COLS.hotFullStatus;

  // 1) Indexa compradores da Hotmart-PHM SOMENTE com status approved/completed.
  // Cruzamento feito exclusivamente por e-mail: Sales History Buyer Email.
  const phmEmails=new Set();
  const fullEmails=new Set();
  const allProds=new Set();
  let buyersApproved=0;
  src.forEach(r=>{
    const sale=sourceSaleFields(r,'full');
    const st=sale.status;
    if(!['approved','completed'].includes(st)) return;
    // No funil, também respeitamos a regra global de venda única/primeira parcela.
    if(!isUniqueSourceSale(sale)) return;
    buyersApproved++;
    const email=norm(sale.email || (cEmail ? r[cEmail] : ''));
    const prod=norm(sale.product || (cProd ? r[cProd] : ''));
    if(prod) allProds.add(prod);
    if(!email) return;
    if(matchKw(prod,PHM_PRODUCTS.phm))  phmEmails.add(email);
    if(matchKw(prod,PHM_PRODUCTS.full)) fullEmails.add(email);
  });

  // 2) Base do funil: leads PHM únicos por e-mail.
  const leadEmails=new Set();
  let leadRows=0, leadRowsWithEmail=0;
  RAW.phm.forEach(r=>{
    leadRows++;
    const email=norm(r[COLS.phmEmail]);
    if(email){ leadRowsWithEmail++; leadEmails.add(email); }
  });

  // 3) Fluxo sequencial:
  // Lead PHM → comprou Plano Head de Marketing → comprou Full Stack Marketing.
  // O último estágio conta apenas quem era lead PHM E também comprou PHM E Full Stack.
  let boughtPHM=0, boughtFullAfterPHM=0;
  leadEmails.forEach(email=>{
    const hasPHM=phmEmails.has(email);
    const hasFull=fullEmails.has(email);
    if(hasPHM) boughtPHM++;
    if(hasPHM && hasFull) boughtFullAfterPHM++;
  });

  const leads=leadEmails.size;
  const prodList=[...allProds];

  // ── Diagnóstico ──
  console.log('%c[dotb] ── Funil PHM ──','color:#89cc72;font-weight:bold');
  console.log('[dotb] Fonte de compras: Hotmart-PHM (gid 721086669)');
  console.log('[dotb] Colunas usadas → lead email:',COLS.phmEmail,'| buyer email:',cEmail,'| produto:',cProd,'| status:',cStatus);
  console.log('[dotb] Linhas Lead PHM:',leadRows,'| linhas com e-mail:',leadRowsWithEmail,'| leads únicos por e-mail:',leads);
  console.log('[dotb] Linhas Hotmart approved/completed e 1ª parcela:',buyersApproved);
  console.log('[dotb] Compradores Plano Head de Marketing (e-mail único):',phmEmails.size,'| Full Stack Marketing (e-mail único):',fullEmails.size);
  console.log('[dotb] Leads que compraram PHM:',boughtPHM,'| Leads que compraram PHM + Full Stack:',boughtFullAfterPHM);
  console.log('[dotb] Produtos encontrados na Hotmart-PHM:',prodList);
  if(!cEmail || !cProd || !cStatus) console.warn('[dotb] ⚠ Verifique os cabeçalhos da Hotmart-PHM. Esperado: Sales History Buyer Email, Sales History Product Name e Sales History Transaction Status.');
  if(buyersApproved===0) console.warn('[dotb] ⚠ Nenhuma compra approved/completed indexada na Hotmart-PHM.');
  if(leads===0) console.warn('[dotb] ⚠ Nenhum lead PHM com e-mail — verifique COLS.phmEmail.');

  // ── Render ──
  const okPHM  = matchKw([...allProds].join(' || '),PHM_PRODUCTS.phm);
  const okFull = matchKw([...allProds].join(' || '),PHM_PRODUCTS.full);
  const steps=[
    {lbl:'Lead PHM', sub:leads+' leads únicos por e-mail', n:leads, bg:'#23291f', bd:'#89cc72'},
    {lbl:'Comprou Plano Head de Marketing', sub:okPHM?'✓ produto localizado':'⚠ ajuste PHM_PRODUCTS.phm', n:boughtPHM, bg:'#2f5a36', bd:'#89cc72'},
    {lbl:'Comprou Full Stack Marketing', sub:okFull?'✓ produto localizado':'⚠ ajuste PHM_PRODUCTS.full', n:boughtFullAfterPHM, bg:'#89cc72', bd:'#4dffa7'}
  ];
  const max=steps[0].n||1;
  wrap.innerHTML=steps.map((s,i)=>{
    const w=Math.max(28,Math.round((s.n/max)*100));
    const rate=i>0&&steps[0].n>0?((s.n/steps[0].n)*100).toFixed(1).replace('.',',')+'% do topo':'';
    const arrow=i<steps.length-1?'<div class="phm-arrow"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 4v15M12 19l-4-4M12 19l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div>':'';
    return '<div class="phm-step">'+
      '<div class="phm-side l">'+(i>0?'<span class="phm-rate">'+rate+'</span>':'')+'</div>'+
      '<div class="phm-bar-wrap"><div class="phm-bar" style="width:'+w+'%;background:'+s.bg+';border:1px solid '+s.bd+';"><div style="text-align:center;padding:0 12px;"><div class="phm-bar-lbl">'+s.lbl.toUpperCase()+'</div><div class="phm-bar-num">'+fmtN(s.n)+'</div></div></div></div>'+
      '<div class="phm-side r">'+s.sub+'</div>'+
    '</div>'+arrow;
  }).join('');
}

// ═══ LOGIN ═══
function initLogin(){
  const form=document.getElementById('loginForm');
  const error=document.getElementById('loginError');
  const user=document.getElementById('loginUser');
  const pass=document.getElementById('loginPass');
  const unlock=()=>document.body.classList.remove('auth-pending');
  if(sessionStorage.getItem('dotb_auth')==='ok') unlock();
  if(form){
    form.addEventListener('submit',e=>{
      e.preventDefault();
      if((user.value||'').trim()==='admin' && (pass.value||'')==='@Mkt2026'){
        sessionStorage.setItem('dotb_auth','ok');
        error.textContent='';
        unlock();
      }else{
        error.textContent='Login ou senha inválidos.';
        pass.value='';
        pass.focus();
      }
    });
  }
  const logout=document.getElementById('btnLogout');
  if(logout) logout.addEventListener('click',()=>{
    sessionStorage.removeItem('dotb_auth');
    document.body.classList.add('auth-pending');
    if(pass) pass.value='';
    if(user) user.focus();
  });
}

    document.getElementById('stApproved').checked=true;
    document.getElementById('stCompleted').checked=true;

    document.getElementById('prodSearch').value='';

    ddLabel('camp',document.querySelectorAll('#campList input').length);
    ddLabel('prod',document.querySelectorAll('#prodList input').length);
    render();
  });
  const bR=document.getElementById('btnRefresh');
  bR.addEventListener('click',async()=>{ bR.classList.add('spinning'); await loadData(); setTimeout(()=>bR.classList.remove('spinning'),600); });
  document.querySelectorAll('.nav-item').forEach(b=>b.addEventListener('click',()=>{
    const el=document.getElementById(b.dataset.target); if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
    document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active')); b.classList.add('active');
  }));

  document.querySelectorAll('#table-sec th.sortable').forEach(th=>{
    th.addEventListener('click',()=>{
      const key=th.dataset.sort;
      if(SORT.key===key){ SORT.dir = SORT.dir==='asc'?'desc':'asc'; }
      else { SORT.key=key; SORT.dir=(key==='code'||key==='name')?'asc':'desc'; } // novo: texto começa A→Z, número maior→menor
      paintTable();
    });
  });

  // Tela cheia do gráfico
  const chartCard=document.getElementById('chartCard');
  const fsBtn=document.getElementById('chartFsBtn');
  if(fsBtn&&chartCard){
    fsBtn.addEventListener('click',()=>{
      const fsEl=document.fullscreenElement||document.webkitFullscreenElement;
      if(fsEl){ (document.exitFullscreen||document.webkitExitFullscreen).call(document); }
      else { (chartCard.requestFullscreen||chartCard.webkitRequestFullscreen).call(chartCard); }
    });
    const ICON_EXPAND='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M8 21H5a2 2 0 0 1-2-2v-3M16 21h3a2 2 0 0 0 2-2v-3"/></svg>';
    const ICON_COMPRESS='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3M21 8h-3a2 2 0 0 1-2-2V3M3 16h3a2 2 0 0 1 2 2v3M16 21v-3a2 2 0 0 1 2-2h3"/></svg>';
    const onFsChange=()=>{
      const inFs=!!(document.fullscreenElement||document.webkitFullscreenElement);
      fsBtn.innerHTML = inFs?ICON_COMPRESS:ICON_EXPAND;
      fsBtn.title = inFs?'Sair da tela cheia':'Tela cheia';
      if(chartInstance) setTimeout(()=>chartInstance.resize(),80);
    };
    document.addEventListener('fullscreenchange',onFsChange);
    document.addEventListener('webkitfullscreenchange',onFsChange);
  }

  setText('tsNow',new Date().toLocaleString('pt-BR'));
}
